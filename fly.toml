# fly.toml app configuration file generated for field-manager-nocyna on 2026-06-13T19:49:39Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'field-manager-nocyna'
primary_region = 'iad'

[build]

[env]
  PORT = "8080"
  HOST = "0.0.0.0"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
